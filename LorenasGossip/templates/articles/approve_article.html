{% extends 'base.html' %}

{% block title %}Approve Article — Lorena's Gossip{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h3 class="mb-3">✅ Approve Article</h3>
            <h4>{{ article.title }}</h4>
            <p class="text-muted">
                By <strong>{{ article.author.username }}</strong>
                · {{ article.created_at|date:"d M Y" }}
            </p>
            <hr>
            <p style="white-space: pre-wrap;">{{ article.content }}</p>
            <hr>
            <form method="post" class="d-flex gap-2">
                {% csrf_token %}
                <button type="submit" class="btn btn-success">
                    ✅ Approve & Publish
                </button>
                <a href="{% url 'pending_articles' %}"
                    class="btn btn-outline-secondary">
                    ← Back
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
