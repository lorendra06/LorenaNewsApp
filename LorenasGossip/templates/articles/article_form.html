{% extends 'base.html' %}

{% block title %}{{ action }} Article — Lorena's Gossip{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h2 class="mb-4">✍️ {{ action }} Article</h2>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            {{ field.label }}
                        </label>
                        {{ field }}
                        {% for error in field.errors %}
                            <div class="text-danger small">{{ error }}</div>
                        {% endfor %}
                    </div>
                {% endfor %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-dark">
                        {{ action }} Article
                    </button>
                    <a href="{% url 'article_list' %}"
                        class="btn btn-outline-secondary">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
